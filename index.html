<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Birthday</title>
  </head>
  <body>
    <div class="envelope new">
      <div class="front">
        <div class="mail">
          <p>
            Happy Birthday <br />
            Samira
          </p>
          <p></p>
        </div>
      </div>
      <div class="back">
        <div class="letter">
          <p>Dear Samira,</p>
          <p class="main">
            You're a beautiful and a strong woman, a crazy redhead, and the kindest person I know. Thank you for teaching me to smile, to laugh and to love. And I wish with all my heart that your life will be full of it too.
            <br>
            Happy 20th Birthday my Samira.
          </p>
          <p>Love, Shubi</p>
        </div>
        <div class="flip left-flip"></div>
        <div class="flip right-flip"></div>
        <div class="flip bottom-flip"></div>
        <div class="flip top-flip"></div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.spritely/0.6.5/jquery.spritely.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
